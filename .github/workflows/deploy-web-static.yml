# Upload SPA build to the hosting bucket and invalidate CloudFront (no CDK).
# Set repository variables: WEB_BUCKET_NAME, WEB_DISTRIBUTION_ID (from stack outputs).
name: deploy-web-static
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc -p packages/contracts/tsconfig.json
      - run: pnpm --filter @domidocs/web build
      - name: Sync to S3
        run: aws s3 sync apps/web/dist s3://${{ vars.WEB_BUCKET_NAME }}/ --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.WEB_DISTRIBUTION_ID }} --paths "/*"
