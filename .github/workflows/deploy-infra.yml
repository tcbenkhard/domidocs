# Deploy storage + data stacks only. Configure AWS OIDC (or access keys) first.
name: deploy-infra
on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage name (e.g. dev, prod)"
        required: true
        default: dev
      stacks:
        description: "cdk deploy argument: DomidocsStorage-<stage> DomidocsData-<stage> or --all"
        required: true
        default: "DomidocsStorage-dev DomidocsData-dev"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc -p packages/contracts/tsconfig.json
      - name: CDK deploy
        working-directory: infra/cdk
        run: |
          pnpm run build
          pnpm exec cdk deploy ${{ inputs.stacks }} --require-approval never -c stage=${{ inputs.stage }}
